services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: maurya
      POSTGRES_PASSWORD: maurya_secret
      POSTGRES_DB: maurya_textile
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
